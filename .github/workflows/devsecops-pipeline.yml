name: devsecops-pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  dependency-scan:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Audit dependencies
        run: |
          pip-audit -r requirements.txt --strict

  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: [dependency-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies + test tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          python -m pytest -q

  container-build:
    name: Container build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: secure-app:${{ github.sha }}
          load: true

  container-scan:
    name: Container vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    needs: [container-build]
    steps:
      - name: Scan image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secure-app:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  deploy:
    name: Deploy (demo)
    runs-on: ubuntu-latest
    needs: [container-scan]
    environment: staging
    steps:
      - name: Deploy to staging (demo)
        run: |
          echo "Deploying secure-app:${{ github.sha }} to staging"
          echo "Deployment completed successfully"
